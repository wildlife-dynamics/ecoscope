name: Build Wizard

on:
  push:
    tags:
      - "wizard/v[0-9]+.[0-9]+.[0-9]+"
    branches:
      - "master"

jobs:
  build:
    name: Build wizard package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Build wizard wheel
      working-directory: wizard/ecoscope-wizard-providers
      run: |
        python -m ensurepip --upgrade
        python -m pip install build
        python -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: pip-dist-wizard
        path: wizard/ecoscope-wizard-providers/dist/

  install:
    name: Install wizard package
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: pip-dist-wizard
          path: dist/
      - name: Install package
        run: python -m pip install dist/*.whl
      - name: Test package
        run: python -c "import ecoscope_events_map_example"

  build-for-prefix:
    name: Build prefix package
    needs:
    - build
    - install
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract version from tag
        run: echo "WIZARD_VERSION=${GITHUB_REF_NAME#wizard/v}" >> "$GITHUB_ENV"
      - uses: prefix-dev/setup-pixi@v0.9.5
      - uses: prefix-dev/rattler-build-action@v0.2.37
      - name: Build conda package
        working-directory: wizard/ecoscope-wizard-providers
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.WIZARD_VERSION }}
        run: pixi build --output-dir /tmp/wizard/artifacts
      - name: Upload to prefix
        run: |
          for file in /tmp/wizard/artifacts/**/*.conda; do
            rattler-build upload prefix -c ecoscope-workflows "$file"
          done
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}

  publish-to-pypi:
    name: Publish to PyPI
    needs:
    - build
    - install
    runs-on: ubuntu-latest
    environment:
      name: release
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      id-token: write

    steps:
      - name: Grab the previously stored build
        uses: actions/download-artifact@v8
        with:
          name: pip-dist-wizard
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
