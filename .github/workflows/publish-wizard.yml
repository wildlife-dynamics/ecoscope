name: Build Wizard

on:
  push:
    tags:
      - "wizard/v[0-9]+.[0-9]+.[0-9]+"
    branches:
      - "master"

jobs:
  build:
    name: Build wizard package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Build wizard wheel
      working-directory: wizard/ecoscope-wizard-providers
      run: |
        python -m ensurepip --upgrade
        python -m pip install build
        python -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v7
      with:
        name: pip-dist-wizard
        path: wizard/ecoscope-wizard-providers/dist/

  install:
    name: Install wizard package
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: pip-dist-wizard
          path: dist/
      - name: Install package
        run: python -m pip install dist/*.whl
      - name: Test package
        run: python -c "import ecoscope_events_map_example"

  github-release:
    name: Create release on GH
    needs:
    - build
    - install
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v8
      with:
        name: pip-dist-wizard
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.2.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        '${{ github.ref_name }}'
        --repo '${{ github.repository }}'
        --generate-notes
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release upload
        '${{ github.ref_name }}' dist/**
        --repo '${{ github.repository }}'

  build-for-prefix:
    name: Build prefix package
    needs:
    - build
    - install
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract version from tag
        run: echo "WIZARD_VERSION=${GITHUB_REF_NAME#wizard/v}" >> "$GITHUB_ENV"
      - name: Install pixi
        run: curl -fsSL https://pixi.sh/install.sh | bash && echo "$HOME/.pixi/bin" >> $GITHUB_PATH
      - name: Build conda package
        working-directory: wizard/ecoscope-wizard-providers
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.WIZARD_VERSION }}
        run: pixi build --output-dir /tmp/wizard/artifacts
      - name: Upload to prefix
        run: |
          for file in /tmp/wizard/artifacts/**/*.conda; do
            rattler-build upload prefix -c ecoscope-workflows "$file"
          done
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}

  publish-to-pypi:
    name: Publish to PyPI
    needs:
    - build
    - install
    runs-on: ubuntu-latest
    environment:
      name: release
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      id-token: write

    steps:
      - name: Grab the previously stored build
        uses: actions/download-artifact@v8
        with:
          name: pip-dist-wizard
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
