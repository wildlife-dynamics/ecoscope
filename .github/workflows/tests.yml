name: Tests

on:
  workflow_call:
    inputs:
      io:
        type: string
        required: true
      os:
        type: string
        required: true
      python-version:    
        type: string
        default: "3.12"

jobs:
  Test:
    strategy:
      fail-fast: false
      matrix:
        to_test: ["not platform", "ecoscope.platform"]
    name: ${{ inputs.os }}, ${{ inputs.io }}${{ matrix.to_test == 'ecoscope.platform' && ', ecoscope.platform' || '' }}
    runs-on: ${{ inputs.os }}
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install our package
        run: |
          python -m ensurepip --upgrade
          python -m pip install ".[analysis,mapping,plotting]" --group test

      - name: Test
        if: matrix.to_test == 'not platform'
        env:
          ER_USERNAME: ${{ secrets.ER_USERNAME }}
          ER_PASSWORD: ${{ secrets.ER_PASSWORD }}
          EE_ACCOUNT: ${{ secrets.EE_ACCOUNT }}
          EE_PRIVATE_KEY_DATA: ${{ secrets.EE_PRIVATE_KEY_DATA }}
          SMART_USERNAME: ${{ secrets.SMART_USERNAME }}
          SMART_PASSWORD: ${{ secrets.SMART_PASSWORD }}
        run: |
          pytest -v -r s -m "${{ inputs.io }}" --color=yes --cov=ecoscope --cov-append --cov-report=xml \
          --ignore=tests/platform

      - uses: 'google-github-actions/auth@v3'
        if: matrix.to_test == 'ecoscope.platform' && inputs.io == 'io'
        id: google-auth
        with:
          credentials_json: '${{ secrets.EE_PRIVATE_KEY_DATA }}'
          create_credentials_file: true
          cleanup_credentials: true

      - name: Test ecoscope.platform
        if: matrix.to_test == 'ecoscope.platform'
        env:
          EARTHRANGER_USERNAME: ${{ secrets.ER_USERNAME }}
          EARTHRANGER_PASSWORD: ${{ secrets.ER_PASSWORD }}
          EARTHRANGER_SERVER: https://mep-dev.pamdas.org
          EE_SERVICE_ACCOUNT: ${{ secrets.EE_ACCOUNT }}
          EE_PRIVATE_KEY_FILE: ${{ steps.google-auth.outputs.credentials_file_path }}
          SMART_USERNAME: ${{ secrets.SMART_USERNAME }}
          SMART_PASSWORD: ${{ secrets.SMART_PASSWORD }}
          SMART_SERVER: https://maratriangleconnect.smartconservationtools.org/smartapi/
        run: |
          python -m pip install -U --upgrade-strategy only-if-needed ".[platform]"
          pytest tests/platform \
          -v -r s -m "${{ inputs.io }}" --color=yes --cov=ecoscope --cov-append --cov-report=xml

      - name: Codecov
        uses: codecov/codecov-action@v5

  Wizard:
    name: ${{ inputs.os }}, wizard
    runs-on: ${{ inputs.os }}
    defaults:
      run:
        shell: bash -leo pipefail {0}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install wizard providers
        run: |
          python -m ensurepip --upgrade
          pip install "./wizard/ecoscope-wizard-providers[dev]"
      - name: Test wizard providers
        working-directory: wizard/ecoscope-wizard-providers
        run: pytest -v --color=yes
